basePath: /api
definitions:
  accounts.CreateRequest:
    properties:
      balance:
        type: integer
      color:
        type: string
      icon:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  accounts.UpdateRequest:
    properties:
      color:
        type: string
      icon:
        type: string
      name:
        type: string
    type: object
  auth.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    type: object
  auth.LoginRequest:
    properties:
      identifier:
        description: email (default) atau nomor telepon (628xxx)
        type: string
      password:
        type: string
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      phone:
        type: string
      referral_code:
        type: string
    type: object
  budget.CreateInput:
    properties:
      kategori:
        type: string
      limit:
        type: integer
      month:
        type: string
    type: object
  budget.UpdateInput:
    properties:
      limit:
        type: integer
    type: object
  categories.CreateInput:
    properties:
      color:
        type: string
      icon:
        type: string
      label:
        type: string
      name:
        type: string
    type: object
  categories.UpdateInput:
    properties:
      color:
        type: string
      icon:
        type: string
      label:
        type: string
    type: object
  groups.CreateRequest:
    properties:
      name:
        type: string
    type: object
  groups.InviteRequest:
    properties:
      phone:
        type: string
    type: object
  groups.TransactionRequest:
    properties:
      deskripsi:
        type: string
      jumlah:
        type: integer
      kategori:
        type: string
      tipe:
        type: string
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  transactions.CreateRequest:
    properties:
      account_id:
        type: string
      deskripsi:
        type: string
      jumlah:
        type: integer
      kategori:
        type: string
      tipe:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API untuk aplikasi pencatat keuangan pribadi.
  title: Money Tracker API
  version: "1.0"
paths:
  /accounts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Daftar akun finansial
      tags:
      - Accounts
    post:
      consumes:
      - application/json
      parameters:
      - description: Data akun
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/accounts.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Buat akun finansial baru
      tags:
      - Accounts
  /accounts/{id}:
    delete:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Hapus akun finansial
      tags:
      - Accounts
    get:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Detail akun finansial
      tags:
      - Accounts
    patch:
      consumes:
      - application/json
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      - description: Data yang diupdate
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/accounts.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Update akun finansial
      tags:
      - Accounts
  /auth/change-password:
    put:
      consumes:
      - application/json
      parameters:
      - description: Password lama dan baru
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Ganti password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Kredensial login
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token (opsional jika pakai cookie)
        in: body
        name: body
        schema:
          $ref: '#/definitions/auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Data registrasi
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
      summary: Daftar akun baru
      tags:
      - Auth
  /balance:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Cek saldo token user
      tags:
      - Balance
  /budgets:
    get:
      parameters:
      - description: Bulan (YYYY-MM), default bulan berjalan
        in: query
        name: month
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Daftar budget per bulan
      tags:
      - Budget
    post:
      consumes:
      - application/json
      parameters:
      - description: Data budget
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/budget.CreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Buat budget baru
      tags:
      - Budget
  /budgets/{id}:
    delete:
      parameters:
      - description: Budget ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Hapus budget
      tags:
      - Budget
    put:
      consumes:
      - application/json
      parameters:
      - description: Budget ID
        in: path
        name: id
        required: true
        type: string
      - description: Limit baru
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/budget.UpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Update limit budget
      tags:
      - Budget
  /budgets/history:
    get:
      parameters:
      - description: Filter kategori
        in: query
        name: kategori
        type: string
      - description: Jumlah bulan ke belakang (default 3, max 12)
        in: query
        name: months
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Histori pengeluaran per kategori
      tags:
      - Budget
  /categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Daftar kategori user
      tags:
      - Categories
    post:
      consumes:
      - application/json
      parameters:
      - description: Data kategori
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/categories.CreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Buat kategori baru
      tags:
      - Categories
  /categories/{id}:
    delete:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Hapus kategori
      tags:
      - Categories
    put:
      consumes:
      - application/json
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      - description: Data yang diupdate
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/categories.UpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Update kategori
      tags:
      - Categories
  /dashboard/chart:
    get:
      parameters:
      - description: Bulan (YYYY-MM)
        in: query
        name: month
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Data chart bulanan (kategori & tren harian)
      tags:
      - Dashboard
  /dashboard/report:
    get:
      parameters:
      - description: 'Periode: weekly / monthly (default monthly)'
        in: query
        name: period
        type: string
      - description: Tanggal acuan (YYYY-MM-DD)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Laporan keuangan per periode
      tags:
      - Dashboard
  /dashboard/summary:
    get:
      parameters:
      - description: Bulan (YYYY-MM), default bulan berjalan
        in: query
        name: month
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Ringkasan keuangan bulanan
      tags:
      - Dashboard
  /groups:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Daftar grup user
      tags:
      - Groups
    post:
      consumes:
      - application/json
      parameters:
      - description: Data grup
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/groups.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Buat grup baru
      tags:
      - Groups
  /groups/{id}/invite:
    post:
      consumes:
      - application/json
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Nomor HP anggota
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/groups.InviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Undang anggota ke grup
      tags:
      - Groups
  /groups/{id}/report:
    get:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Bulan (YYYY-MM)
        in: query
        name: month
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Laporan keuangan grup
      tags:
      - Groups
  /groups/{id}/transactions:
    post:
      consumes:
      - application/json
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Data transaksi
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/groups.TransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Buat transaksi dalam grup
      tags:
      - Groups
  /payments:
    get:
      parameters:
      - description: 'Filter status: pending / verified / rejected'
        in: query
        name: status
        type: string
      - description: Halaman
        in: query
        name: page
        type: integer
      - description: Jumlah per halaman
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Riwayat pembayaran user
      tags:
      - Payments
  /payments/topup:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Jumlah top-up
        in: formData
        name: amount
        required: true
        type: integer
      - description: Keterangan
        in: formData
        name: description
        type: string
      - description: Bukti transfer (maks 5MB)
        in: formData
        name: proof
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Ajukan top-up token
      tags:
      - Payments
  /referral/generate:
    post:
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Generate kode referral baru
      tags:
      - Referral
  /referral/summary:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Ringkasan referral user
      tags:
      - Referral
  /transactions:
    get:
      parameters:
      - description: Halaman
        in: query
        name: page
        type: integer
      - description: Jumlah per halaman
        in: query
        name: per_page
        type: integer
      - description: IN / OUT / TRANSFER
        in: query
        name: tipe
        type: string
      - description: Kategori
        in: query
        name: kategori
        type: string
      - description: Kata kunci
        in: query
        name: search
        type: string
      - description: Dari tanggal (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: Sampai tanggal (YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Daftar transaksi
      tags:
      - Transactions
    post:
      consumes:
      - application/json
      parameters:
      - description: Data transaksi
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/transactions.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Buat transaksi baru
      tags:
      - Transactions
  /transactions/{id}:
    delete:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Hapus transaksi
      tags:
      - Transactions
    get:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Detail transaksi
      tags:
      - Transactions
securityDefinitions:
  BearerAuth:
    description: 'Masukkan token dengan format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
